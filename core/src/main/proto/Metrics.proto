syntax = "proto3";
package info.pithos.runtime.model.metrics;

// ─── Shared enums ─────────────────────────────────────────────────────────────

// Unit of measurement for a metric value.
// Determines routing: MS → raw table (individual observations for percentiles);
// COUNT/BYTES/PERCENT → counter table (accumulated within flush window).
enum MetricUnit {
  COUNT   = 0;  // default — number of occurrences
  MS      = 1;  // milliseconds — timing / latency
  BYTES   = 2;  // data volume
  PERCENT = 3;  // ratio / utilisation
}

enum ProtocolType {
  HTTP = 0;
  GRPC = 1;
}

enum ComponentType {
  RELATIONAL = 0;
  CACHE      = 1;
  BLOB       = 2;
  MESSAGING  = 3;
  ANALYTICS  = 4;
}

// ─── MetricEvent — API surface ────────────────────────────────────────────────
//
// Lightweight descriptor passed to MetricsCollector.record().
// The metric name encodes the operation and its outcome:
//   e.g. "write.latency", "write.success", "write.failure", "write.timeout"
//
// MetricUnit controls routing:
//   MS           → raw table (per-request row with requestId cluster key)
//   COUNT/BYTES/PERCENT → counter table (accumulated in flush window)
//
// Tier routing:
//   componentId set             → Tier 3  InfraMetricRaw / InfraCounter
//   step set + rc.journey set   → Tier 1  JourneyMetricRaw / JourneyCounter
//   neither                     → Tier 2  ServiceMetricRaw / ServiceCounter

message MetricEvent {
  string        metric           = 1;
  MetricUnit    unit             = 2;
  double        value            = 3;

  // Tier 1 — set by handlers at the journey/step boundary
  string        step             = 4;

  // Tier 3 — set by runtime/data client interceptors
  ComponentType componentType    = 5;
  string        componentId      = 6;
  string        componentProvider= 7;

  // Tier 2 — HTTP path or gRPC method name
  string        method           = 8;
  ProtocolType  protocol         = 9;
}

// ─── Key convention ───────────────────────────────────────────────────────────
//
// Every analytic table message has a companion key message as its first field.
//   field[1] = partition key  (always dateBucket, format yyyy-MM-dd-HH)
//   field[2..N] = cluster keys in positional order (max 4 for BQ parity)

// ─── Tier 1 — Business / Journey Metrics ──────────────────────────────────────

message JourneyMetricKey {
  string dateBucket   = 1;  // partition
  string enterpriseId = 2;  // cluster[1]
  string journey      = 3;  // cluster[2]
  string requestId    = 4;  // cluster[3]
  string step         = 5;  // cluster[4]
}

// One row per MS-unit metric event within a journey step execution.
message JourneyMetricRaw {
  JourneyMetricKey key            = 1;
  string           metric         = 2;
  MetricUnit       unit           = 3;
  double           value          = 4;
  int64            utcTimestampMs = 5;
  string           traceId        = 6;
}

// Counter: event occurrences accumulated within a flush window.
// One row per (dateBucket, enterpriseId, journey, step, metric).
// The metric name encodes the full semantic: "cassandra.write.success", "cassandra.write.latency.gt.10.ms".
message JourneyCounterKey {
  string dateBucket   = 1;  // partition
  string enterpriseId = 2;  // cluster[1]
  string journey      = 3;  // cluster[2]
  string step         = 4;  // cluster[3]
  string metric       = 5;  // cluster[4]
}

message JourneyCounter {
  JourneyCounterKey key   = 1;
  double            value = 2;  // count as double for count metrics; ms for latency percentiles
}


// ─── Tier 2 — Application / Service Metrics ───────────────────────────────────

message ServiceMetricKey {
  string dateBucket   = 1;  // partition
  string enterpriseId = 2;  // cluster[1]
  string serviceName  = 3;  // cluster[2]
  string requestId    = 4;  // cluster[3]
}

// One row per MS-unit metric event emitted by a service or async worker.
message ServiceMetricRaw {
  ServiceMetricKey key            = 1;
  string           instanceId     = 2;
  string           journey        = 3;
  ProtocolType     protocol       = 4;
  string           method         = 5;
  string           metric         = 6;
  MetricUnit       unit           = 7;
  double           value          = 8;
  int64            utcTimestampMs = 9;
  string           traceId        = 10;
}

// Counter: event occurrences accumulated within a flush window.
// One row per (dateBucket, enterpriseId, serviceName, instanceId, metric).
message ServiceCounterKey {
  string dateBucket   = 1;  // partition
  string enterpriseId = 2;  // cluster[1]
  string serviceName  = 3;  // cluster[2]
  string instanceId   = 4;  // cluster[3]
  string metric       = 5;  // cluster[4]
}

message ServiceCounter {
  ServiceCounterKey key   = 1;
  double            value = 2;
}


// ─── Tier 3 — Infrastructure Metrics ──────────────────────────────────────────
//
// Logged automatically by runtime/data client interceptors.
// metric encodes operation + outcome: "write.latency", "write.failure".

message InfraMetricKey {
  string        dateBucket    = 1;  // partition
  ComponentType componentType = 2;  // cluster[1]
  string        componentId   = 3;  // cluster[2]
  string        requestId     = 4;  // cluster[3]
}

// One row per MS-unit metric event intercepted at the runtime/data client layer.
message InfraMetricRaw {
  InfraMetricKey key               = 1;
  string         instanceId        = 2;
  string         componentProvider = 3;
  string         metric            = 4;
  MetricUnit     unit              = 5;
  double         value             = 6;
  int64          utcTimestampMs    = 7;
  string         traceId           = 8;
}

// Counter: event occurrences accumulated within a flush window.
// One row per (dateBucket, componentType, componentId, instanceId, metric).
message InfraCounterKey {
  string        dateBucket    = 1;  // partition
  ComponentType componentType = 2;  // cluster[1]
  string        componentId   = 3;  // cluster[2]
  string        instanceId    = 4;  // cluster[3]
  string        metric        = 5;  // cluster[4]
}

message InfraCounter {
  InfraCounterKey key   = 1;
  double          value = 2;
}

